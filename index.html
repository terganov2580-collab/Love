<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Приглашение ❤️</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --tg-bg: var(--tg-theme-bg-color, #ffeef2);
            --tg-text: var(--tg-theme-text-color, #4a2040);
            --card-bg: #ffffff;
            --shadow: 0 8px 32px rgba(255, 105, 180, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffd1dc 0%, #ffe4e1 50%, #ffd1dc 100%);
            font-family: 'Montserrat', sans-serif;
            color: #4a2040;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            transition: background 0.3s;
            background-attachment: fixed;
            overflow: hidden;
            position: relative;
        }

        .petals-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .petal {
            position: absolute;
            top: -10%;
            opacity: 0.7;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0.2; }
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .confetti-piece {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: confetti-burst 0.8s ease-out forwards;
            will-change: transform, opacity;
        }

        @keyframes confetti-burst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        .container {
            width: 100%;
            max-width: 380px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            box-shadow: var(--shadow);
            padding: 30px 20px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.8);
            animation: floatIn 0.6s ease-out;
            min-height: 380px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 22px;
            width: 100%;
            transition: opacity 0.4s ease;
        }

        .screen.active {
            display: flex;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-family: 'Pacifico', cursive;
            font-size: 26px;
            color: #d9466e;
            line-height: 1.3;
            font-weight: 400;
            margin: 0;
        }

        .subtitle {
            font-size: 17px;
            color: #6e4b5e;
            font-weight: 500;
            line-height: 1.5;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            width: 100%;
            margin-top: 10px;
        }

        .btn {
            background: linear-gradient(135deg, #ff8da1, #ff5d7a);
            border: none;
            border-radius: 50px;
            padding: 14px 28px;
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 93, 122, 0.35);
            transition: all 0.3s ease;
            min-width: 120px;
            text-align: center;
            position: relative;
            z-index: 1;
            user-select: none;
            letter-spacing: 0.5px;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn.secondary {
            background: #ffe0e6;
            color: #d9466e;
            box-shadow: 0 4px 15px rgba(217, 70, 110, 0.15);
        }

        .btn.secondary:hover {
            background: #ffccd5;
        }

        .date-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .btn-date {
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: center;
        }

        .btn-no.animate-out {
            transform: translateX(110px) scale(0.1);
            opacity: 0;
        }

        .btn-yes.animate-big {
            transform: scale(1.8);
            z-index: 2;
            box-shadow: 0 10px 30px rgba(255, 93, 122, 0.5);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="petals-bg" id="petalsContainer"></div>
    <div class="confetti-container" id="confettiContainer"></div>

    <div class="container">
        <div class="card" id="card">
            <div class="screen active" id="screen1">
                <h2>Привет! 🌸</h2>
                <p class="subtitle">Сейчас будет небольшой опрос, который обязательно нужно пройти. Нажми на кнопку, когда будешь готова!</p>
                <button class="btn" onclick="showScreen(2)">Продолжить</button>
            </div>
            <div class="screen" id="screen2">
                <h2>Как твоё настроение? 💫</h2>
                <div class="buttons">
                    <button class="btn" id="mood-good" onclick="moodGood()">Хорошее</button>
                    <button class="btn secondary" id="mood-bad" onclick="moodBadToGood()">Не очень</button>
                </div>
            </div>
            <div class="screen" id="screen3">
                <h2>Я рад, что ты в хорошем настроении! 🌷</h2>
                <button class="btn" onclick="showScreen(4)">Продолжить</button>
            </div>
            <div class="screen" id="screen4">
                <h2>Мы давно не виделись. Давай погуляем на этих выходных? 🌿</h2>
                <div class="date-buttons" id="invite-buttons">
                    <button class="btn btn-date btn-yes" id="btn-yes" onclick="inviteYes()">Да</button>
                    <button class="btn btn-date secondary btn-no" id="btn-no" onclick="inviteNo()">Нет</button>
                </div>
            </div>
            <div class="screen" id="screen5">
                <h2>Отлично! Выбери день, когда тебе удобнее 📅</h2>
                <div class="buttons">
                    <button class="btn" onclick="selectDay('Суббота')">Суббота</button>
                    <button class="btn" onclick="selectDay('Воскресенье')">Воскресенье</button>
                </div>
            </div>
            <div class="screen" id="screen6"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const MY_USERNAME = 'rweflbic';

        function createPetals() {
            const container = document.getElementById('petalsContainer');
            const colors = ['#ffb6c1', '#ffc0cb', '#ffe4e1', '#ffd1dc', '#ff99aa'];
            for (let i = 0; i < 20; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.innerHTML = '🌸';
                petal.style.fontSize = (14 + Math.random() * 20) + 'px';
                petal.style.left = Math.random() * 100 + '%';
                petal.style.animationDuration = (8 + Math.random() * 8) + 's';
                petal.style.animationDelay = Math.random() * 8 + 's';
                petal.style.opacity = 0.5 + Math.random() * 0.5;
                petal.style.color = colors[Math.floor(Math.random() * colors.length)];
                container.appendChild(petal);
            }
        }
        createPetals();

        function launchConfetti() {
            const container = document.getElementById('confettiContainer');
            const shapes = ['❤️', '🌸', '✨', '●'];
            const colors = ['#ff4d6d', '#ff8da1', '#ffb3c6', '#ffe4e1', '#ff5d7a', '#fff0f3'];
            for (let i = 0; i < 60; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.textContent = shapes[Math.floor(Math.random() * shapes.length)];
                piece.style.fontSize = (14 + Math.random() * 18) + 'px';
                piece.style.left = '50%';
                piece.style.top = '50%';
                piece.style.color = colors[Math.floor(Math.random() * colors.length)];
                const angle = Math.random() * Math.PI * 2;
                const distance = 80 + Math.random() * 200;
                piece.style.setProperty('--x', Math.cos(angle) * distance + 'px');
                piece.style.setProperty('--y', Math.sin(angle) * distance + 'px');
                container.appendChild(piece);
                piece.addEventListener('animationend', () => piece.remove());
            }
        }

        function showScreen(num) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const next = document.getElementById('screen' + num);
            if (next) {
                next.classList.add('active');
                next.style.animation = 'none';
                next.offsetHeight;
                next.style.animation = 'fadeIn 0.5s ease';
            }
        }

        function moodGood() { showScreen(3); }
        function moodBadToGood() {
            const badBtn = document.getElementById('mood-bad');
            badBtn.textContent = 'Хорошее';
            badBtn.classList.remove('secondary');
            badBtn.classList.add('btn');
            badBtn.onclick = moodGood;
        }

        let noClicked = false;
        function inviteYes() {
            launchConfetti();
            setTimeout(() => showScreen(5), 600);
        }

        function inviteNo() {
            if (noClicked) return;
            noClicked = true;
            const btnNo = document.getElementById('btn-no');
            const btnYes = document.getElementById('btn-yes');
            btnNo.classList.add('animate-out');
            btnYes.classList.add('animate-big');
            btnNo.addEventListener('transitionend', function handler() {
                btnNo.removeEventListener('transitionend', handler);
                btnNo.classList.add('hidden');
                btnYes.onclick = inviteYes;
            });
            btnNo.style.pointerEvents = 'none';
        }

        function selectDay(day) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const finalScreen = document.getElementById('screen6');
            finalScreen.innerHTML = `
                <h2>Спасибо за прохождение! ❤️</h2>
                <p class="subtitle">Нажми кнопку ниже, чтобы отправить мне выбранный день</p>
                <button class="btn" id="sendBtn">Отправить 💌</button>
                <p style="font-size:12px; color:#999;">Откроется чат — просто нажми «Отправить»</p>
            `;
            finalScreen.classList.add('active');
            document.getElementById('sendBtn').addEventListener('click', () => {
                const message = day === 'Суббота' ? 'Пойдём в субботу!' : 'Пойдём в воскресенье!';
                window.open(`https://t.me/${MY_USERNAME}?text=${encodeURIComponent(message)}`, '_blank');
            });
        }
    </script>
</body>
              </html>
